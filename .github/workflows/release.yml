name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: AniPlay-Windows
            build-command: npx electron-builder --win portable --publish never
            artifact-path: ani-cli-gui/dist/*.exe
          - name: Linux
            os: ubuntu-24.04
            artifact: AniPlay-Linux
            build-command: npx electron-builder --linux AppImage tar.gz --publish never
            artifact-path: |
              ani-cli-gui/dist/**/*.AppImage
              ani-cli-gui/dist/**/*.tar.gz

    defaults:
      run:
        working-directory: ani-cli-gui

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ani-cli-gui/package-lock.json

      - name: Install Linux System Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends squashfs-tools

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Renderer and Electron
        run: npm run build:ui

      - name: Package ${{ matrix.name }}
        run: ${{ matrix.build-command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ${{ matrix.name }} Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/**
