name: Feature request
description: Suggest a new feature, UX improvement, or provider addition.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to do, and where does AniPlay currently get in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Playback
        - Search
        - AniList
        - Discord Rich Presence
        - Downloads
        - Provider
        - Packaging/updates
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or other approaches.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I checked existing issues for similar requests.
          required: true
